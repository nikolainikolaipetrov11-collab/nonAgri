#配置统一
[paths]
date_raw_dir = "date/raw"
date_process_dir = "date/process"
date_out_dir = "date/out"
date_out_non_agri_dir = "date/out_nonAgri"
parcel_shp = "shp/huocheng_dk_260605.shp"
agri_parcels_shp = "shp/Agri_Parcels.shp"
raw_landuse_shp = "shp/huocheng_dk_260605.shp"
checkpoint_dir = "model/checkpoints"
evaluation_dir = "model/evaluation_results"
safe_grain_dir = "shp/safe_grain"
non_grain_dir = "shp/non_grain"
non_agri_dir = "shp/non_agri"
human_check_dir = "shp/human_check"

[processing]
full_months = [4, 5, 6, 7, 8, 9, 10]
chunk_size = 8192
mosaic_chunk_size = 4096
max_workers = 4

[training]
mask_ratio = 0.25
noise_rate = 0.35
epoch_gradual = 30
num_epochs = 100
batch_size = 256
learning_rate = 0.0001

[inference]
batch_size = 256
texture_start_idx = 43
texture_end_idx = 46

[quality]
# 自动质量分最低保留值，避免某个月份被完全忽略导致分母为 0。
min_quality = 0.05

[quality.month_weights]
# 人工月份质量权重：1.0 表示质量正常，越低表示该月影像整体可信度越低。
# 如果后续发现某个月云、雾、缺景严重，可以只调这里，不需要改代码。
"4" = 1.0
"5" = 1.0
"6" = 1.0
"7" = 1.0
"8" = 1.0
"9" = 1.0
"10" = 1.0

[gmm]
min_clusters = 3
max_clusters = 8
ndvi_idx = 0
glcm_idx = 43

[routing]
safe_grain_confidence_floor = 0.80
physical_veto_confidence = 0.65
abandoned_peak_ndvi_max = 0.55
orchard_spring_ndvi_min = 0.18
orchard_ndvi_std_max = 0.20
orchard_glcm_global_ratio = 1.0

[active_learning]
batch_size = 20
confidence_floor = 0.60
